<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC Marketing</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 50px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,.3);
    width: 90%;
    max-width: 500px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

p {
    font-size: 1.2rem;
    color: #dbeafe;
    margin-bottom: 25px;
}

a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    border: 2px solid white;
    padding: 12px 28px;
    border-radius: 50px;
    transition: .3s;
    display: inline-block;
}

a:hover {
    background: white;
    color: #1e3a8a;
}
</style>

</head>
<body>

<div class="container">
    <h1>ABC Marketing</h1>
    <p>Helping businesses grow through digital marketing.</p>

    <a href="mailto:info@abcmarketing.ca">
        info@abcmarketing.ca
    </a>
</div>

</body>
</html>
